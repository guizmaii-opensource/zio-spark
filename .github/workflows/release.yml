name: Release

# Triggered when a draft released is "published" (not a draft anymore)
on:
  release:
    types: [ published ]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: sbt/setup-sbt@v1
      - uses: coursier/cache-action@v6
      - uses: olafurpg/setup-gpg@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          check-latest: true

      - name: Publish signed artifacts
        run: sbt '+publishSigned'
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

      # The ZioSparkCodegenPlugin source generator regenerates tracked files
      # during compilation, making the git tree dirty. After cross-build (+)
      # resets, sbt reapplies settings and sbt-dynver re-evaluates the version,
      # producing a SNAPSHOT version that the Central Portal rejects.
      # Cleaning the tree between steps ensures sonatypeBundleRelease sees
      # the correct tag-based version.
      - name: Reset git state for sbt-dynver
        run: git checkout -- . && git clean -fd

      - name: Release to Sonatype Central
        run: sbt 'sonatypeBundleRelease'
        env:
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
